<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho de Compras</title>
  <link rel="stylesheet" href="../css/carrinho.css">

  <link rel="shortcut icon" href="../assets/Quadar Inshallah Wallpaper Linkedin_2.jpg" type="image/x-icon" />
</head>

<body>

  <header>
    <div class="header-logo">
      <img class="logo_img" src="../assets/logo/Logo Quadar Inshallah Elipse Hand Envolted PNG.png"
        alt="Quadar Inshallah Co. & Records Logo">
    </div>

    <div class="menu">
      <span class="name-logo">Quadar Inshallah Co. & Records</span>
      <nav>
        <ul class="nav-links">
          <li><a href="../index.html">
              <img src="../assets/logo/cardapio.png" alt="menu" width="20px">
            </a></li>
          <li><a href="#services">
              <img src="../assets/logo/stacks_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png" alt="stories">
            </a></li>

          <li><a href="#aboutus">
              <img src="../assets/logo/groups_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png" alt="groups">
            </a></li>

          <li><a href="./carrinho.html">
              <img src="../assets/logo/shopping_cart.png" alt="cart">
            </a></li>


        </ul>
      </nav>
    </div>
  </header>

  <!-- Carrinho -->
  <main class="cart-container">

    <h1>Seus produtos</h1>

    <!-- 🔽 AQUI FICA VAZIO -->
    <section class="cart-items"></section>

    <!-- Resumo -->
    <section class="cart-summary">
      <div class="summary-line">
        <span>Total</span>
        <strong class="cart-total">R$ 0,00</strong>
      </div>

      <button id="buyButton">Comprar</button>
    </section>

  </main>

  <script src="../js/cart.js"></script>
</body>

</html>
