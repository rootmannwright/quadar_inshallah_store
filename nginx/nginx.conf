# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf  –  Production config
# Stack: React SPA (static) + Node.js API (upstream)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;                         # 1 worker per CPU core
worker_rlimit_nofile  65535;                    # max open file descriptors

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ─── Events ──────────────────────────────────────────────────────────────────
events {
    worker_connections  4096;
    use  epoll;                                 # Linux best-practice
    multi_accept  on;
}

# ─── HTTP ─────────────────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time';

    access_log  /var/log/nginx/access.log  main buffer=32k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    server_tokens       off;                    # hide nginx version

    # ── Compression ──────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone   $binary_remote_addr  zone=api:10m   rate=30r/s;
    limit_req_zone   $binary_remote_addr  zone=login:10m rate=5r/m;
    limit_conn_zone  $binary_remote_addr  zone=conn:10m;

    # ── Upstream: Node.js API ─────────────────────────────────────────────────
    upstream nodejs_api {
        least_conn;
        server  127.0.0.1:5000  max_fails=3  fail_timeout=30s;
        # server  127.0.0.1:5001  max_fails=3  fail_timeout=30s;  # second instance
        keepalive  32;
    }

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen       80;
        listen       [::]:80;
        server_name  yourdomain.com www.yourdomain.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;              # Let's Encrypt challenge
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  yourdomain.com www.yourdomain.com;

        root  /var/www/app/dist;               # React build output
        index index.html;

        # ── TLS ──────────────────────────────────────────────────────────────
        ssl_certificate      /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers  on;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache          shared:SSL:10m;
        ssl_session_timeout        1d;
        ssl_session_tickets        off;
        ssl_stapling               on;
        ssl_stapling_verify        on;
        resolver                   1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout           5s;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.yourdomain.com; frame-ancestors 'none';"
            always;

        # ── Connection limits ─────────────────────────────────────────────────
        limit_conn  conn  100;

        # ── Buffer / timeout tuning ───────────────────────────────────────────
        client_max_body_size      10m;
        client_body_buffer_size   128k;
        proxy_connect_timeout     10s;
        proxy_send_timeout        30s;
        proxy_read_timeout        30s;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api  burst=60  nodelay;

            proxy_pass         http://nodejs_api;
            proxy_http_version 1.1;

            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   Connection         "";   # keep-alive to upstream

            proxy_hide_header  X-Powered-By;
        }

        # ── Stricter rate limit on auth endpoints ─────────────────────────────
        location ~ ^/api/(auth/login|auth/register) {
            limit_req  zone=login  burst=10  nodelay;

            proxy_pass         http://nodejs_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Static assets (hashed filenames – cache forever) ──────────────────
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback (client-side routing) ───────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # index.html must NOT be cached by the browser
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Block common attack vectors ───────────────────────────────────────
        location ~* \.(php|aspx|asp|cgi|env|git)$ {
            return 404;
        }

        location ~ /\. {
            deny all;                           # block dotfiles / .git
        }
    }
}