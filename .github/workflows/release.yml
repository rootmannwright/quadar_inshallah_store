name: Generate Release Badge

on:
  release:
    types: [created, published, edited]

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get release tag
        id: get_tag
        run: echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Generate badge
        run: |
          echo "Generating badge for release $RELEASE_TAG"
          mkdir -p badge
          cat <<EOF > badge/release.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="20">
            <rect width="120" height="20" fill="#555"/>
            <rect x="70" width="50" height="20" fill="#4c1"/>
            <text x="35" y="14" fill="#fff" font-family="Verdana" font-size="11" text-anchor="middle">release</text>
            <text x="95" y="14" fill="#fff" font-family="Verdana" font-size="11" text-anchor="middle">$RELEASE_TAG</text>
          </svg>
          EOF

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badge/release.svg
          git commit -m "Update release badge for $RELEASE_TAG" || echo "No changes to commit"
          git push