name: CI / CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      # só roda se existir
      - name: Run tests
        run: npm test --if-present

      # backend NÃO precisa de build
      - name: Skip build
        run: echo "Backend does not require build step"

  deploy:
    name: Deploy
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: echo "Deploy ready (Railway / VPS / PM2)"